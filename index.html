<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Quvera Business Portal</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e8b84b" />
    <meta name="description" content="Manage your business profile, leads, quotations and reviews on Quvera." />

    <!-- iOS / Apple PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quvera Business" />
    <link rel="apple-touch-icon" href="/quvera-icon.png?v=4" />
    <link rel="icon" type="image/png" href="/quvera-icon.png?v=4" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register service worker (PWA) — with auto-update so installed apps refresh -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          // if an SW already controls this page, a future controller change means
          // a new version activated → reload once to load the fresh app
          var hadController = !!navigator.serviceWorker.controller;
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (refreshing || !hadController) return;
            refreshing = true;
            window.location.reload();
          });
          navigator.serviceWorker.register('/sw.js').then(function (reg) {
            reg.update();                                   // check for a new SW now
            setInterval(function () { reg.update(); }, 30 * 60 * 1000); // and every 30 min
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible') reg.update();
            });
          }).catch(function () {});
        });
      }
    </script>
  </body>
</html>
